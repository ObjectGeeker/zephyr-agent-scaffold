# basic config
spring.application.name=zephyr-agent-scaffold
#spring.config.import=classpath:agent/demo-agent.yml
spring.profiles.active=local
server.servlet.context-path=/api

# datasource config
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.url=jdbc:mysql://localhost:3306/agent_scaffold?useUnicode=true&characterEncoding=utf8&autoReconnect=true&zeroDateTimeBehavior=convertToNull&serverTimezone=UTC&useSSL=true
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=Retail_HikariCP
spring.datasource.hikari.minimum-idle=15
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# Mybatis-plus config
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.banner=false
mybatis-plus.mapper-locations=classpath:/mapper/*.xml

# knife4j
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.group-configs[0].group=default
springdoc.group-configs[0].paths-to-match=/**
springdoc.group-configs[0].packages-to-scan=com.object.ai

# knife4j enhance
knife4j.enable=true
knife4j.setting.language=zh_cn

# weixin config
wechat.mp.app-id=your-test-app-id
wechat.mp.secret=your-test-app-secret
wechat.mp.token=your-custom-token
wechat.mp.aes-key=
wechat.mp.qrcode-expire-seconds=300

# sa-token config
sa-token.token-name=zephyr-agent-scaffold
sa-token.timeout=2592000
sa-token.active-timeout=-1
sa-token.is-concurrent=true
sa-token.is-share=false
sa-token.token-style=uuid
sa-token.is-log=true
sa-token.jwt-secret-key=zephyr-agent-scaffold

# redis config
redis.config.enable=false
redis.config.host=localhost
redis.config.port=6379
redis.config.password=
redis.config.pool-size=64
redis.config.min-idle-size=10
redis.config.idle-timeout=10000
redis.config.connect-timeout=10000
redis.config.retry-attempts=3
redis.config.retry-interval=1000
redis.config.ping-interval=0
redis.config.keep-alive=true

# file config
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=0
file.storage.config.storage-type=minio
file.storage.config.allowed-mime-types[0]=image/jpeg
file.storage.config.allowed-mime-types[1]=image/png
file.storage.config.allowed-mime-types[2]=image/jpg
file.storage.config.local.root-path=data/files
file.storage.config.temp-clean.enable=true
file.storage.config.temp-clean.expire-days=1

file.storage.config.minio.bucket-name=
file.storage.config.minio.endpoint=
file.storage.config.minio.access-key=
file.storage.config.minio.secret-key=
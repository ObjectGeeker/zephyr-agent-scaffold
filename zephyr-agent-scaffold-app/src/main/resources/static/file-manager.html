<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理 — Zephyr Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --primary: #10a37f;
            --primary-hover: #0d8c6d;
            --danger: #e74c3c;
            --warning: #f39c12;
            --sidebar-bg: #202123;
            --sidebar-hover: #2a2b32;
            --sidebar-text: #ececf1;
            --sidebar-muted: #8e8ea0;
            --main-bg: #f7f7f8;
            --main-surface: #ffffff;
            --text-main: #353740;
            --text-muted: #6e6e80;
            --border: #e5e5e5;
            --shadow: 0 0 15px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --main-bg: #343541;
            --main-surface: #444654;
            --text-main: #ececf1;
            --text-muted: #acacbe;
            --border: #565869;
            --shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; }

        html, body {
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            margin: 0;
            background: var(--main-bg);
            color: var(--text-main);
        }

        .manager-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
        }

        .manager-sidebar {
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: #fff;
            font-weight: 800;
        }

        .sidebar-copy { margin-top: 72px; }

        .sidebar-copy h1 {
            margin: 0 0 14px;
            font-size: clamp(28px, 4vw, 40px);
            line-height: 1.15;
            letter-spacing: -0.04em;
        }

        .sidebar-copy p {
            color: var(--sidebar-muted);
            line-height: 1.8;
            font-size: 15px;
        }

        .sidebar-actions {
            display: grid;
            gap: 12px;
        }

        .sidebar-link,
        .sidebar-button {
            min-height: 40px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            background: transparent;
            color: var(--sidebar-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
        }

        .sidebar-link:hover,
        .sidebar-button:hover {
            background: var(--sidebar-hover);
            color: var(--sidebar-text);
        }

        .manager-main {
            min-width: 0;
            padding: 32px;
        }

        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }

        .page-header h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .page-header p {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .theme-toggle {
            border: 1px solid var(--border);
            background: var(--main-surface);
            color: var(--text-main);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .card-panel {
            background: var(--main-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .filter-panel {
            padding: 20px;
            margin-bottom: 18px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(120px, 1fr));
            gap: 12px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .input,
        .select,
        .file-input {
            background: var(--main-bg);
            border-color: var(--border);
            color: var(--text-main);
        }

        .input:focus,
        .select:focus,
        .file-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.12);
        }

        .filter-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }

        .primary-btn,
        .ghost-btn,
        .danger-btn,
        .warning-btn {
            min-height: 38px;
            border-radius: 10px;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        .primary-btn {
            border: none;
            background: var(--primary);
            color: #fff;
        }

        .primary-btn:hover { background: var(--primary-hover); }

        .ghost-btn {
            border: 1px solid var(--border);
            background: var(--main-surface);
            color: var(--text-main);
        }

        .ghost-btn:hover { background: var(--main-bg); }

        .danger-btn {
            border: none;
            background: var(--danger);
            color: #fff;
        }

        .warning-btn {
            border: none;
            background: var(--warning);
            color: #fff;
        }

        button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .message-box {
            display: block;
            margin-bottom: 18px;
            padding: 12px 14px;
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message-box.hidden { display: none; }

        .message-box.success {
            background: rgba(16, 163, 127, 0.12);
            border-color: rgba(16, 163, 127, 0.32);
            color: var(--primary);
        }

        .message-box.error {
            background: rgba(231, 76, 60, 0.12);
            border-color: rgba(231, 76, 60, 0.3);
            color: #c0392b;
        }

        .message-box.info {
            background: rgba(84, 54, 218, 0.1);
            border-color: rgba(84, 54, 218, 0.25);
            color: #5436da;
        }

        [data-theme="dark"] .message-box.success { color: #7ce0c2; }
        [data-theme="dark"] .message-box.error { color: #ff9a8d; }
        [data-theme="dark"] .message-box.info { color: #b8adff; }

        .table-panel { overflow: hidden; }
        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            text-align: left;
            white-space: nowrap;
            font-size: 13px;
        }

        th {
            color: var(--text-muted);
            background: var(--main-bg);
            font-weight: 700;
        }

        td { color: var(--text-main); }

        .empty-state {
            padding: 48px 20px;
            color: var(--text-muted);
            text-align: center;
        }

        .badge-soft {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            border-radius: 999px;
            padding: 0 9px;
            background: rgba(16, 163, 127, 0.12);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
        }

        .badge-warn {
            background: rgba(231, 76, 60, 0.12);
            color: var(--danger);
        }

        .badge-muted {
            background: rgba(110, 110, 128, 0.14);
            color: var(--text-muted);
        }

        .row-actions {
            display: flex;
            gap: 8px;
        }

        .link-btn {
            border: none;
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            padding: 0;
        }

        .link-btn.danger { color: var(--danger); }
        .link-btn.warning { color: var(--warning); }

        .pagination-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .pagination-actions {
            display: flex;
            gap: 8px;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.45);
        }

        .modal-backdrop.show { display: flex; }

        .modal-card {
            width: 100%;
            max-width: 720px;
            max-height: calc(100vh - 40px);
            background: var(--main-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: auto;
        }

        .modal-header,
        .modal-footer {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-footer {
            border-top: 1px solid var(--border);
            border-bottom: none;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
        }

        .modal-body { padding: 20px; }

        .preview-image {
            display: block;
            max-width: 100%;
            max-height: 70vh;
            margin: 0 auto;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--main-bg);
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .modal-section {
            grid-column: 1 / -1;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--main-bg);
        }

        .upload-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: end;
        }

        .muted-text {
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            max-width: 320px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 1200px) {
            .filter-grid {
                grid-template-columns: repeat(3, minmax(120px, 1fr));
            }
        }

        @media (max-width: 860px) {
            .manager-shell { grid-template-columns: 1fr; }
            .manager-sidebar {
                min-height: auto;
                padding: 24px;
            }
            .sidebar-copy { margin-top: 42px; }
            .manager-main { padding: 24px; }
        }

        @media (max-width: 640px) {
            .filter-grid,
            .modal-grid,
            .upload-row {
                grid-template-columns: 1fr;
            }
            .page-header,
            .pagination-bar {
                align-items: stretch;
                flex-direction: column;
            }
            .header-actions {
                align-items: stretch;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="manager-shell">
    <aside class="manager-sidebar">
        <div>
            <div class="brand">
                <div class="brand-mark">Z</div>
                <span>Zephyr Agent</span>
            </div>
            <div class="sidebar-copy">
                <h1>管理系统文件。</h1>
                <p>上传临时文件、补充业务信息，并统一维护文件元数据与存储对象。</p>
            </div>
        </div>
        <div class="sidebar-actions">
            <a class="sidebar-link" href="user-manager.html">用户管理页面</a>
            <a class="sidebar-link" href="index.html">返回对话页面</a>
            <button class="sidebar-button" id="logoutBtn" type="button">重新登录</button>
        </div>
    </aside>

    <main class="manager-main">
        <div class="page-header">
            <div>
                <h2>文件管理</h2>
                <p id="userSummary">管理员可查询文件、上传临时文件并维护文件业务信息。</p>
            </div>
            <div class="header-actions">
                <button class="primary-btn" id="createFileBtn" type="button">新增文件</button>
                <button class="theme-toggle" id="themeToggle" type="button">主题切换</button>
            </div>
        </div>

        <div class="message-box hidden" id="messageBox" role="alert"></div>

        <section class="card-panel filter-panel" id="managerContent">
            <div class="filter-grid">
                <div>
                    <label class="form-label" for="filterOriginName">原始文件名</label>
                    <input class="input input-bordered w-full" id="filterOriginName" type="text" placeholder="文件名">
                </div>
                <div>
                    <label class="form-label" for="filterStorageType">存储类型</label>
                    <select class="select select-bordered w-full" id="filterStorageType">
                        <option value="">全部类型</option>
                        <option value="local">local</option>
                        <option value="minio">minio</option>
                    </select>
                </div>
                <div>
                    <label class="form-label" for="filterBucket">Bucket</label>
                    <input class="input input-bordered w-full" id="filterBucket" type="text" placeholder="bucket">
                </div>
                <div>
                    <label class="form-label" for="filterObjectKey">Object Key</label>
                    <input class="input input-bordered w-full" id="filterObjectKey" type="text" placeholder="object key">
                </div>
                <div>
                    <label class="form-label" for="filterUserId">用户 ID</label>
                    <input class="input input-bordered w-full" id="filterUserId" type="text" placeholder="userId">
                </div>
                <div>
                    <label class="form-label" for="filterBizType">业务类型</label>
                    <input class="input input-bordered w-full" id="filterBizType" type="text" placeholder="avatar">
                </div>
                <div>
                    <label class="form-label" for="filterBizId">业务 ID</label>
                    <input class="input input-bordered w-full" id="filterBizId" type="text" placeholder="bizId">
                </div>
                <div>
                    <label class="form-label" for="filterStatus">状态</label>
                    <select class="select select-bordered w-full" id="filterStatus">
                        <option value="">全部状态</option>
                        <option value="UPLOADING">UPLOADING</option>
                        <option value="SUCCESS">SUCCESS</option>
                        <option value="FAILED">FAILED</option>
                    </select>
                </div>
                <div>
                    <label class="form-label" for="filterIsTemp">临时文件</label>
                    <select class="select select-bordered w-full" id="filterIsTemp">
                        <option value="">全部</option>
                        <option value="true">临时</option>
                        <option value="false">正式</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <button class="ghost-btn" id="resetBtn" type="button">重置</button>
                <button class="primary-btn" id="searchBtn" type="button">查询</button>
            </div>
        </section>

        <section class="card-panel table-panel" id="managerTable">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>文件名</th>
                        <th>存储</th>
                        <th>Object Key</th>
                        <th>大小</th>
                        <th>MIME</th>
                        <th>用户</th>
                        <th>业务</th>
                        <th>状态</th>
                        <th>临时</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="fileTableBody"></tbody>
                </table>
                <div class="empty-state hidden" id="emptyState">暂无文件数据</div>
            </div>
            <div class="pagination-bar">
                <span id="pageInfo">第 1 页 / 共 1 页，共 0 条</span>
                <div class="pagination-actions">
                    <button class="ghost-btn" id="prevPageBtn" type="button">上一页</button>
                    <button class="ghost-btn" id="nextPageBtn" type="button">下一页</button>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="modal-backdrop" id="fileModal">
    <section class="modal-card">
        <div class="modal-header">
            <h3 id="modalTitle">新增文件</h3>
        </div>
        <form id="fileForm">
            <div class="modal-body">
                <input id="editId" type="hidden">
                <input id="uploadedFileId" type="hidden">
                <div class="modal-grid">
                    <div class="modal-section">
                        <label class="form-label" for="fileInput">文件上传</label>
                        <div class="upload-row">
                            <input class="file-input file-input-bordered w-full" id="fileInput" type="file">
                            <button class="warning-btn" id="uploadFileBtn" type="button">上传文件</button>
                        </div>
                        <p class="muted-text" id="uploadHint">新增时请先上传文件；编辑时可不上传，或上传新文件来替换旧文件。</p>
                        <p class="muted-text">临时文件 ID：<span class="mono" id="uploadedFileIdText">-</span></p>
                    </div>
                    <div>
                        <label class="form-label" for="editOriginName">原始文件名</label>
                        <input class="input input-bordered w-full" id="editOriginName" type="text" placeholder="展示文件名">
                    </div>
                    <div>
                        <label class="form-label" for="editBizType">业务类型</label>
                        <input class="input input-bordered w-full" id="editBizType" type="text" placeholder="avatar / knowledge">
                    </div>
                    <div class="modal-section" id="currentFileInfo">
                        <p class="muted-text">当前文件：<span class="mono" id="currentObjectKey">-</span></p>
                        <p class="muted-text">访问地址：<span id="currentFileUrl">-</span></p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="ghost-btn" id="cancelFileBtn" type="button">取消</button>
                <button class="primary-btn" id="saveFileBtn" type="submit">保存</button>
            </div>
        </form>
    </section>
</div>

<div class="modal-backdrop" id="previewModal">
    <section class="modal-card">
        <div class="modal-header">
            <h3 id="previewTitle">图片预览</h3>
        </div>
        <div class="modal-body">
            <img class="preview-image" id="previewImage" src="" alt="文件预览">
        </div>
        <div class="modal-footer">
            <button class="ghost-btn" id="closePreviewBtn" type="button">关闭</button>
        </div>
    </section>
</div>

<script>
(function () {
    'use strict';

    const API_BASE = '/api';
    const STORAGE_THEME = 'chat_theme';
    const STORAGE_USER = 'zephyr_auth_user';
    const PAGE_SIZE = 10;

    let currentUser = null;
    let files = [];
    let currentPage = 1;
    let totalPages = 1;
    let totalRecords = 0;
    let loading = false;
    let modalMode = 'create';

    const $ = (sel) => document.querySelector(sel);
    const html = document.documentElement;
    const messageBox = $('#messageBox');
    const tableBody = $('#fileTableBody');
    const emptyState = $('#emptyState');
    const pageInfo = $('#pageInfo');
    const prevPageBtn = $('#prevPageBtn');
    const nextPageBtn = $('#nextPageBtn');
    const fileModal = $('#fileModal');
    const previewModal = $('#previewModal');

    function getStoredUser() {
        try {
            const raw = localStorage.getItem(STORAGE_USER);
            return raw ? JSON.parse(raw) : null;
        } catch (error) {
            return null;
        }
    }

    function hasRole(user, role) {
        return Array.isArray(user?.roles) && user.roles.includes(role);
    }

    function showMessage(message, type = 'info') {
        const safeType = ['success', 'error', 'info'].includes(type) ? type : 'info';
        messageBox.className = `message-box ${safeType}`;
        messageBox.textContent = message;
        messageBox.classList.remove('hidden');
    }

    function clearMessage() {
        messageBox.className = 'message-box hidden';
        messageBox.textContent = '';
    }

    function setLoading(nextLoading) {
        loading = nextLoading;
        $('#searchBtn').disabled = loading;
        $('#resetBtn').disabled = loading;
        $('#createFileBtn').disabled = loading;
        $('#uploadFileBtn').disabled = loading;
        $('#saveFileBtn').disabled = loading;
        prevPageBtn.disabled = loading || currentPage <= 1;
        nextPageBtn.disabled = loading || currentPage >= totalPages;
    }

    async function parseResponse(res, fallbackMessage) {
        let json = null;
        try {
            json = await res.json();
        } catch (error) {
            throw new Error('服务响应解析失败');
        }
        if (json.code !== 200) {
            throw new Error(json.message || fallbackMessage);
        }
        return json.data;
    }

    async function apiPost(path, payload) {
        const res = await fetch(`${API_BASE}${path}`, {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        return parseResponse(res, '请求失败');
    }

    async function apiUpload(file, request) {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('request', new Blob([JSON.stringify(request || {})], { type: 'application/json' }));
        const res = await fetch(`${API_BASE}/file/manager/upload`, {
            method: 'POST',
            credentials: 'include',
            body: formData
        });
        return parseResponse(res, '上传失败');
    }

    function getFilterInfo() {
        const filterInfo = {};
        const fields = [
            ['originName', $('#filterOriginName').value.trim()],
            ['storageType', $('#filterStorageType').value],
            ['bucket', $('#filterBucket').value.trim()],
            ['objectKey', $('#filterObjectKey').value.trim()],
            ['userId', $('#filterUserId').value.trim()],
            ['bizType', $('#filterBizType').value.trim()],
            ['bizId', $('#filterBizId').value.trim()],
            ['status', $('#filterStatus').value]
        ];
        fields.forEach(([key, value]) => {
            if (value) {
                filterInfo[key] = value;
            }
        });
        const isTemp = $('#filterIsTemp').value;
        if (isTemp) {
            filterInfo.isTemp = isTemp === 'true';
        }
        return filterInfo;
    }

    async function loadFiles(page = currentPage) {
        try {
            setLoading(true);
            clearMessage();
            const pageData = await apiPost('/file/manager/findAllFile', {
                pageIndex: page,
                pageSize: PAGE_SIZE,
                filterInfo: getFilterInfo()
            });
            files = Array.isArray(pageData?.records) ? pageData.records : [];
            currentPage = Number(pageData?.current || page);
            totalPages = Math.max(1, Number(pageData?.pages || 1));
            totalRecords = Number(pageData?.total || 0);
            renderTable();
            renderPagination();
        } catch (error) {
            files = [];
            renderTable();
            renderPagination();
            showMessage(error.message, 'error');
        } finally {
            setLoading(false);
        }
    }

    function renderTable() {
        tableBody.innerHTML = '';
        emptyState.classList.toggle('hidden', files.length > 0);
        files.forEach((file) => {
            const tr = document.createElement('tr');
            const previewUrl = getPreviewUrl(file.id);
            tr.innerHTML = `
                <td>${escapeHtml(file.originName || file.fileName || '-')}</td>
                <td>${escapeHtml(file.storageType || '-')}${file.bucket ? ` / ${escapeHtml(file.bucket)}` : ''}</td>
                <td><span class="mono" title="${escapeAttribute(file.objectKey || '')}">${escapeHtml(file.objectKey || '-')}</span></td>
                <td>${formatFileSize(file.fileSize)}</td>
                <td>${escapeHtml(file.contentType || '-')}</td>
                <td>${escapeHtml(file.userId || '-')}</td>
                <td>${escapeHtml(file.bizType || '-')}${file.bizId ? ` / ${escapeHtml(file.bizId)}` : ''}</td>
                <td>${renderStatus(file.status)}</td>
                <td>${renderTemp(file.isTemp)}</td>
                <td>${formatTime(file.createTime)}</td>
                <td>
                    <div class="row-actions">
                        <a class="link-btn" href="${escapeAttribute(previewUrl)}" target="_blank" rel="noreferrer">打开</a>
                        <button class="link-btn" type="button" data-action="preview" data-id="${escapeAttribute(file.id)}">预览</button>
                        <button class="link-btn" type="button" data-action="edit" data-id="${escapeAttribute(file.id)}">编辑</button>
                        <button class="link-btn danger" type="button" data-action="delete" data-id="${escapeAttribute(file.id)}">删除</button>
                    </div>
                </td>
            `;
            tableBody.appendChild(tr);
        });
    }

    function renderStatus(status) {
        const isFailed = status === 'FAILED';
        const isUploading = status === 'UPLOADING';
        return `<span class="badge-soft ${isFailed ? 'badge-warn' : ''} ${isUploading ? 'badge-muted' : ''}">${escapeHtml(status || '-')}</span>`;
    }

    function renderTemp(isTemp) {
        return `<span class="badge-soft ${isTemp ? 'badge-warn' : ''}">${isTemp ? '临时' : '正式'}</span>`;
    }

    function renderPagination() {
        pageInfo.textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页，共 ${totalRecords} 条`;
        prevPageBtn.disabled = loading || currentPage <= 1;
        nextPageBtn.disabled = loading || currentPage >= totalPages;
    }

    function findFile(id) {
        return files.find((file) => file.id === id);
    }

    function getPreviewUrl(fileId) {
        return `${API_BASE}/file/manager/preview/${encodeURIComponent(fileId || '')}`;
    }

    function openCreateModal() {
        modalMode = 'create';
        $('#modalTitle').textContent = '新增文件';
        $('#editId').value = '';
        $('#uploadedFileId').value = '';
        $('#uploadedFileIdText').textContent = '-';
        $('#fileInput').value = '';
        $('#editOriginName').value = '';
        $('#editBizType').value = '';
        $('#currentObjectKey').textContent = '-';
        $('#currentFileUrl').innerHTML = '-';
        $('#uploadHint').textContent = '请选择文件并点击上传，上传成功后再保存文件详情。';
        fileModal.classList.add('show');
    }

    function openEditModal(file) {
        modalMode = 'edit';
        $('#modalTitle').textContent = '编辑文件';
        $('#editId').value = file.id || '';
        $('#uploadedFileId').value = '';
        $('#uploadedFileIdText').textContent = '-';
        $('#fileInput').value = '';
        $('#editOriginName').value = file.originName || '';
        $('#editBizType').value = file.bizType || '';
        $('#currentObjectKey').textContent = file.objectKey || '-';
        const previewUrl = getPreviewUrl(file.id);
        $('#currentFileUrl').innerHTML = `<a class="link-btn" href="${escapeAttribute(previewUrl)}" target="_blank" rel="noreferrer">${escapeHtml(previewUrl)}</a>`;
        $('#uploadHint').textContent = '如需替换文件，请先上传新文件；只改信息可直接保存。';
        fileModal.classList.add('show');
    }

    function closeFileModal() {
        fileModal.classList.remove('show');
    }

    function previewImage(file) {
        if (!String(file.contentType || '').startsWith('image/')) {
            showMessage('当前文件不是图片类型，请使用“打开”查看。', 'info');
            return;
        }
        $('#previewTitle').textContent = file.originName || file.fileName || '图片预览';
        $('#previewImage').src = getPreviewUrl(file.id);
        $('#previewImage').alt = file.originName || file.fileName || '文件预览';
        previewModal.classList.add('show');
    }

    function closePreviewModal() {
        previewModal.classList.remove('show');
        $('#previewImage').src = '';
    }

    async function uploadSelectedFile() {
        const file = $('#fileInput').files[0];
        if (!file) {
            showMessage('请先选择文件', 'error');
            return;
        }
        try {
            setLoading(true);
            const uploadedId = await apiUpload(file, {
                bizType: $('#editBizType').value.trim()
            });
            $('#uploadedFileId').value = uploadedId;
            $('#uploadedFileIdText').textContent = uploadedId;
            if (!$('#editOriginName').value.trim()) {
                $('#editOriginName').value = file.name;
            }
            showMessage('临时文件上传成功，请继续保存文件详情', 'success');
        } catch (error) {
            showMessage(error.message, 'error');
        } finally {
            setLoading(false);
        }
    }

    async function saveFile(event) {
        event.preventDefault();
        const uploadedFileId = $('#uploadedFileId').value;
        if (modalMode === 'create' && !uploadedFileId) {
            showMessage('请先上传文件', 'error');
            return;
        }
        const payload = {
            id: modalMode === 'create' ? uploadedFileId : $('#editId').value,
            fileId: modalMode === 'edit' ? uploadedFileId : '',
            originName: $('#editOriginName').value.trim(),
            bizType: $('#editBizType').value.trim()
        };
        try {
            setLoading(true);
            await apiPost('/file/manager/batchSave', modalMode === 'create'
                ? { addedData: [payload], modifyData: [], removeData: [] }
                : { addedData: [], modifyData: [payload], removeData: [] });
            closeFileModal();
            showMessage(modalMode === 'create' ? '文件详情已创建' : '文件详情已更新', 'success');
            await loadFiles(currentPage);
        } catch (error) {
            showMessage(error.message, 'error');
        } finally {
            setLoading(false);
        }
    }

    async function deleteFile(file) {
        if (!confirm(`确认删除文件「${file.originName || file.fileName || file.id}」吗？`)) {
            return;
        }
        try {
            setLoading(true);
            await apiPost('/file/manager/batchSave', {
                addedData: [],
                modifyData: [],
                removeData: [{ id: file.id }]
            });
            showMessage('文件已删除', 'success');
            await loadFiles(currentPage);
        } catch (error) {
            showMessage(error.message, 'error');
        } finally {
            setLoading(false);
        }
    }

    function handleTableClick(event) {
        const button = event.target.closest('button[data-action]');
        if (!button) {
            return;
        }
        const file = findFile(button.dataset.id);
        if (!file) {
            showMessage('文件数据不存在，请刷新后重试', 'error');
            return;
        }
        if (button.dataset.action === 'edit') {
            openEditModal(file);
        } else if (button.dataset.action === 'preview') {
            previewImage(file);
        } else if (button.dataset.action === 'delete') {
            deleteFile(file);
        }
    }

    function resetFilters() {
        $('#filterOriginName').value = '';
        $('#filterStorageType').value = '';
        $('#filterBucket').value = '';
        $('#filterObjectKey').value = '';
        $('#filterUserId').value = '';
        $('#filterBizType').value = '';
        $('#filterBizId').value = '';
        $('#filterStatus').value = '';
        $('#filterIsTemp').value = '';
        loadFiles(1);
    }

    function formatTime(value) {
        if (!value) {
            return '-';
        }
        return String(value).replace('T', ' ').slice(0, 19);
    }

    function formatFileSize(value) {
        const bytes = Number(value || 0);
        if (!bytes) {
            return '0 B';
        }
        const units = ['B', 'KB', 'MB', 'GB'];
        let size = bytes;
        let unitIndex = 0;
        while (size >= 1024 && unitIndex < units.length - 1) {
            size /= 1024;
            unitIndex += 1;
        }
        return `${size.toFixed(unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function escapeAttribute(value) {
        return escapeHtml(value).replaceAll('`', '&#96;');
    }

    function logout() {
        localStorage.removeItem(STORAGE_USER);
        window.location.href = 'login.html';
    }

    function loadTheme() {
        const theme = localStorage.getItem(STORAGE_THEME) || 'light';
        html.setAttribute('data-theme', theme);
        updateThemeToggle(theme);
    }

    function updateThemeToggle(theme) {
        $('#themeToggle').textContent = theme === 'dark' ? '切换亮色' : '主题切换';
    }

    function toggleTheme() {
        const current = html.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem(STORAGE_THEME, next);
        updateThemeToggle(next);
    }

    function guardPage() {
        currentUser = getStoredUser();
        if (!currentUser) {
            window.location.href = 'login.html';
            return false;
        }
        $('#userSummary').textContent = `${currentUser.username || currentUser.userAccount || '管理员'}，可上传临时文件并维护文件元数据。`;
        if (!hasRole(currentUser, 'ADMIN')) {
            $('#managerContent').style.display = 'none';
            $('#managerTable').style.display = 'none';
            $('#createFileBtn').style.display = 'none';
            showMessage('当前用户无权访问文件管理页面，请返回对话页面或重新登录管理员账号。', 'error');
            return false;
        }
        return true;
    }

    $('#searchBtn').addEventListener('click', () => loadFiles(1));
    $('#resetBtn').addEventListener('click', resetFilters);
    $('#createFileBtn').addEventListener('click', openCreateModal);
    $('#uploadFileBtn').addEventListener('click', uploadSelectedFile);
    $('#fileForm').addEventListener('submit', saveFile);
    $('#cancelFileBtn').addEventListener('click', closeFileModal);
    prevPageBtn.addEventListener('click', () => {
        if (currentPage > 1) {
            loadFiles(currentPage - 1);
        }
    });
    nextPageBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
            loadFiles(currentPage + 1);
        }
    });
    tableBody.addEventListener('click', handleTableClick);
    fileModal.addEventListener('click', (event) => {
        if (event.target === fileModal) {
            closeFileModal();
        }
    });
    $('#closePreviewBtn').addEventListener('click', closePreviewModal);
    previewModal.addEventListener('click', (event) => {
        if (event.target === previewModal) {
            closePreviewModal();
        }
    });
    $('#logoutBtn').addEventListener('click', logout);
    $('#themeToggle').addEventListener('click', toggleTheme);

    loadTheme();
    if (guardPage()) {
        loadFiles(1);
    }
})();
</script>
</body>
</html>

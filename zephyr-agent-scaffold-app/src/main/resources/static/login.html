<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册 — Zephyr Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --primary: #10a37f;
            --primary-hover: #0d8c6d;
            --sidebar-bg: #202123;
            --sidebar-hover: #2a2b32;
            --sidebar-text: #ececf1;
            --sidebar-muted: #8e8ea0;
            --main-bg: #f7f7f8;
            --main-surface: #ffffff;
            --text-main: #353740;
            --text-muted: #6e6e80;
            --border: #e5e5e5;
            --shadow: 0 0 15px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --main-bg: #343541;
            --main-surface: #444654;
            --text-main: #ececf1;
            --text-muted: #acacbe;
            --border: #565869;
            --shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; }

        html, body {
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            margin: 0;
            background: var(--main-bg);
            color: var(--text-main);
        }

        .auth-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(260px, 420px) minmax(0, 1fr);
        }

        .auth-sidebar {
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: #fff;
            font-weight: 800;
        }

        .sidebar-copy {
            margin-top: 80px;
        }

        .sidebar-copy h1 {
            margin: 0 0 14px;
            font-size: clamp(28px, 4vw, 42px);
            line-height: 1.15;
            letter-spacing: -0.04em;
        }

        .sidebar-copy p {
            color: var(--sidebar-muted);
            line-height: 1.8;
            font-size: 15px;
        }

        .sidebar-link {
            color: var(--sidebar-muted);
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .sidebar-link:hover { color: var(--sidebar-text); }

        .auth-main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: var(--main-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .auth-card-header {
            padding: 28px 28px 18px;
        }

        .auth-card-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .auth-card-header p {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .tab-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 28px 18px;
        }

        .tab-btn {
            border: 1px solid var(--border);
            background: var(--main-bg);
            color: var(--text-main);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .form-panel {
            padding: 0 28px 28px;
        }

        .auth-message {
            display: block;
            width: 100%;
            margin-bottom: 20px;
            padding: 12px 14px;
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .auth-message.hidden {
            display: none;
        }

        .auth-message.success {
            background: rgba(16, 163, 127, 0.12);
            border-color: rgba(16, 163, 127, 0.32);
            color: var(--primary);
        }

        .auth-message.error {
            background: rgba(231, 76, 60, 0.12);
            border-color: rgba(231, 76, 60, 0.3);
            color: #c0392b;
        }

        .auth-message.info {
            background: rgba(84, 54, 218, 0.1);
            border-color: rgba(84, 54, 218, 0.25);
            color: #5436da;
        }

        [data-theme="dark"] .auth-message.success {
            color: #7ce0c2;
        }

        [data-theme="dark"] .auth-message.error {
            color: #ff9a8d;
        }

        [data-theme="dark"] .auth-message.info {
            color: #b8adff;
        }

        .form-control label span {
            color: var(--text-muted);
            font-size: 13px;
        }

        .destination-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .destination-option {
            position: relative;
        }

        .destination-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .destination-card {
            display: block;
            min-height: 76px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--main-bg);
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .destination-title {
            display: block;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 700;
        }

        .destination-desc {
            display: block;
            margin-top: 6px;
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .destination-option input:checked + .destination-card {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.12);
        }

        .input {
            background: var(--main-bg);
            border-color: var(--border);
            color: var(--text-main);
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.12);
        }

        .primary-btn {
            width: 100%;
            min-height: 44px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        .primary-btn:hover { background: var(--primary-hover); }
        .primary-btn:disabled { opacity: 0.65; cursor: not-allowed; }

        .divider-text {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 12px;
            margin: 20px 0;
        }

        .divider-text::before,
        .divider-text::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .secondary-link {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }

        .secondary-link:hover { background: var(--main-bg); }

        .theme-toggle {
            position: fixed;
            right: 24px;
            top: 24px;
            border: 1px solid var(--border);
            background: var(--main-surface);
            color: var(--text-main);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        @media (max-width: 860px) {
            .auth-shell {
                grid-template-columns: 1fr;
            }

            .auth-sidebar {
                min-height: auto;
                padding: 24px;
            }

            .sidebar-copy {
                margin-top: 42px;
            }

            .auth-main {
                min-height: auto;
                padding: 24px;
            }
        }
    </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" type="button">主题切换</button>

<div class="auth-shell">
    <aside class="auth-sidebar">
        <div>
            <div class="brand">
                <div class="brand-mark">Z</div>
                <span>Zephyr Agent</span>
            </div>
            <div class="sidebar-copy">
                <h1>登录后开始你的智能体对话。</h1>
                <p>沿用对话页面的简洁布局、绿色主色和明暗主题。登录或注册后将自动进入 ChatGPT Web 页面。</p>
            </div>
        </div>
        <a class="sidebar-link" href="index.html">暂不登录，返回对话页</a>
    </aside>

    <main class="auth-main">
        <section class="auth-card">
            <div class="auth-card-header">
                <h2 id="panelTitle">欢迎回来</h2>
                <p id="panelSubtitle">使用账号和密码登录 Zephyr Agent。</p>
            </div>

            <div class="tab-wrap" role="tablist" aria-label="登录注册切换">
                <button class="tab-btn active" id="loginTab" type="button">登录</button>
                <button class="tab-btn" id="registerTab" type="button">注册</button>
            </div>

            <div class="form-panel">
                <div class="auth-message hidden" id="messageBox" role="alert"></div>

                <form id="authForm">
                    <div class="form-control mb-4" id="usernameGroup" style="display: none;">
                        <label class="label" for="username">
                            <span class="label-text">用户名</span>
                        </label>
                        <input class="input input-bordered w-full" id="username" name="username" type="text" autocomplete="nickname" placeholder="请输入用户名">
                    </div>

                    <div class="form-control mb-4">
                        <label class="label" for="account">
                            <span class="label-text">账号</span>
                        </label>
                        <input class="input input-bordered w-full" id="account" name="account" type="text" autocomplete="username" placeholder="请输入账号" required>
                    </div>

                    <div class="form-control mb-5">
                        <label class="label" for="password">
                            <span class="label-text">密码</span>
                        </label>
                        <input class="input input-bordered w-full" id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required>
                    </div>

                    <div class="destination-grid" aria-label="登录后进入页面">
                        <label class="destination-option">
                            <input type="radio" name="destination" value="chat" checked>
                            <span class="destination-card">
                                <span class="destination-title">进入对话页面</span>
                                <span class="destination-desc">开始智能体对话与工具调用。</span>
                            </span>
                        </label>
                        <label class="destination-option">
                            <input type="radio" name="destination" value="manager">
                            <span class="destination-card">
                                <span class="destination-title">进入用户管理</span>
                                <span class="destination-desc">管理员维护用户资料、角色和状态。</span>
                            </span>
                        </label>
                    </div>

                    <button class="primary-btn" id="submitBtn" type="submit">登录</button>
                </form>

                <div class="divider-text">或者</div>
                <a class="secondary-link" href="wechat-login.html">使用微信扫码登录</a>
            </div>
        </section>
    </main>
</div>

<script>
(function () {
    'use strict';

    const API_BASE = '/api';
    const STORAGE_THEME = 'chat_theme';
    const STORAGE_USER = 'zephyr_auth_user';

    let mode = 'login';

    const $ = (sel) => document.querySelector(sel);
    const html = document.documentElement;
    const messageBox = $('#messageBox');
    const form = $('#authForm');
    const loginTab = $('#loginTab');
    const registerTab = $('#registerTab');
    const usernameGroup = $('#usernameGroup');
    const panelTitle = $('#panelTitle');
    const panelSubtitle = $('#panelSubtitle');
    const submitBtn = $('#submitBtn');
    const accountInput = $('#account');
    const passwordInput = $('#password');
    const usernameInput = $('#username');

    function isAdmin(user) {
        return Array.isArray(user?.roles) && user.roles.includes('ADMIN');
    }

    function getDestination() {
        const selected = document.querySelector('input[name="destination"]:checked');
        return selected ? selected.value : 'chat';
    }

    function showMessage(message, type = 'info') {
        const safeType = ['success', 'error', 'info'].includes(type) ? type : 'info';
        messageBox.className = `auth-message ${safeType}`;
        messageBox.textContent = message;
        messageBox.classList.remove('hidden');
    }

    function clearMessage() {
        messageBox.className = 'auth-message hidden';
        messageBox.textContent = '';
    }

    function setMode(nextMode) {
        mode = nextMode;
        const isLogin = mode === 'login';
        clearMessage();

        loginTab.classList.toggle('active', isLogin);
        registerTab.classList.toggle('active', !isLogin);
        usernameGroup.style.display = isLogin ? 'none' : 'block';
        usernameInput.required = !isLogin;
        passwordInput.autocomplete = isLogin ? 'current-password' : 'new-password';

        panelTitle.textContent = isLogin ? '欢迎回来' : '创建账号';
        panelSubtitle.textContent = isLogin ? '使用账号和密码登录 Zephyr Agent。' : '填写用户名、账号和密码完成注册。';
        submitBtn.textContent = isLogin ? '登录' : '注册';
    }

    function setLoading(loading) {
        submitBtn.disabled = loading;
        submitBtn.textContent = loading ? '处理中...' : (mode === 'login' ? '登录' : '注册');
    }

    async function requestAuth(payload) {
        const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';
        const res = await fetch(`${API_BASE}${endpoint}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        const json = await res.json();
        if (json.code !== 200) {
            throw new Error(json.message || (mode === 'login' ? '登录失败' : '注册失败'));
        }
        return json.data;
    }

    async function handleSubmit(event) {
        event.preventDefault();

        const account = accountInput.value.trim();
        const password = passwordInput.value.trim();
        const username = usernameInput.value.trim();

        if (!account || !password || (mode === 'register' && !username)) {
            showMessage(mode === 'login' ? '请输入账号和密码' : '请输入用户名、账号和密码', 'error');
            return;
        }

        const payload = mode === 'login'
            ? {
                loginType: 'account',
                loginAccount: account,
                loginCertificate: password
            }
            : {
                registerType: 'account',
                username,
                registerAccount: account,
                registerCertificate: password
            };

        try {
            setLoading(true);
            clearMessage();
            const user = await requestAuth(payload);
            localStorage.setItem(STORAGE_USER, JSON.stringify(user));
            const destination = getDestination();
            if (destination === 'manager' && !isAdmin(user)) {
                showMessage('当前用户无权访问用户管理页面，请选择进入对话页面。', 'error');
                return;
            }
            const targetPage = destination === 'manager' ? 'user-manager.html' : 'index.html';
            const targetName = destination === 'manager' ? '用户管理页面' : '对话页面';
            showMessage(`${mode === 'login' ? '登录成功' : '注册成功'}，正在进入${targetName}...`, 'success');
            setTimeout(() => {
                window.location.href = targetPage;
            }, 900);
        } catch (error) {
            showMessage(error.message, 'error');
        } finally {
            setLoading(false);
        }
    }

    function loadTheme() {
        const theme = localStorage.getItem(STORAGE_THEME) || 'light';
        html.setAttribute('data-theme', theme);
        updateThemeToggle(theme);
    }

    function updateThemeToggle(theme) {
        $('#themeToggle').textContent = theme === 'dark' ? '切换亮色' : '主题切换';
    }

    function toggleTheme() {
        const current = html.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem(STORAGE_THEME, next);
        updateThemeToggle(next);
    }

    loginTab.addEventListener('click', () => setMode('login'));
    registerTab.addEventListener('click', () => setMode('register'));
    form.addEventListener('submit', handleSubmit);
    $('#themeToggle').addEventListener('click', toggleTheme);

    loadTheme();
    setMode('login');
})();
</script>
</body>
</html>

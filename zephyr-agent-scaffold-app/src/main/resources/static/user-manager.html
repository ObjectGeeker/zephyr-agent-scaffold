<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 — Zephyr Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --primary: #10a37f;
            --primary-hover: #0d8c6d;
            --danger: #e74c3c;
            --warning: #f39c12;
            --sidebar-bg: #202123;
            --sidebar-hover: #2a2b32;
            --sidebar-text: #ececf1;
            --sidebar-muted: #8e8ea0;
            --main-bg: #f7f7f8;
            --main-surface: #ffffff;
            --text-main: #353740;
            --text-muted: #6e6e80;
            --border: #e5e5e5;
            --shadow: 0 0 15px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --main-bg: #343541;
            --main-surface: #444654;
            --text-main: #ececf1;
            --text-muted: #acacbe;
            --border: #565869;
            --shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; }

        html, body {
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            margin: 0;
            background: var(--main-bg);
            color: var(--text-main);
        }

        .manager-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(260px, 340px) minmax(0, 1fr);
        }

        .manager-sidebar {
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: #fff;
            font-weight: 800;
        }

        .sidebar-copy {
            margin-top: 72px;
        }

        .sidebar-copy h1 {
            margin: 0 0 14px;
            font-size: clamp(28px, 4vw, 40px);
            line-height: 1.15;
            letter-spacing: -0.04em;
        }

        .sidebar-copy p {
            color: var(--sidebar-muted);
            line-height: 1.8;
            font-size: 15px;
        }

        .sidebar-actions {
            display: grid;
            gap: 12px;
        }

        .sidebar-link,
        .sidebar-button {
            min-height: 40px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            background: transparent;
            color: var(--sidebar-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
        }

        .sidebar-link:hover,
        .sidebar-button:hover {
            background: var(--sidebar-hover);
            color: var(--sidebar-text);
        }

        .manager-main {
            min-width: 0;
            padding: 32px;
        }

        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }

        .page-header h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .page-header p {
            margin-top: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .theme-toggle {
            border: 1px solid var(--border);
            background: var(--main-surface);
            color: var(--text-main);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .card-panel {
            background: var(--main-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .filter-panel {
            padding: 20px;
            margin-bottom: 18px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(120px, 1fr));
            gap: 12px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .input,
        .select {
            background: var(--main-bg);
            border-color: var(--border);
            color: var(--text-main);
        }

        .input:focus,
        .select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.12);
        }

        .filter-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }

        .primary-btn,
        .ghost-btn,
        .danger-btn,
        .warning-btn {
            min-height: 38px;
            border-radius: 10px;
            padding: 0 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        .primary-btn {
            border: none;
            background: var(--primary);
            color: #fff;
        }

        .primary-btn:hover { background: var(--primary-hover); }

        .ghost-btn {
            border: 1px solid var(--border);
            background: var(--main-surface);
            color: var(--text-main);
        }

        .ghost-btn:hover { background: var(--main-bg); }

        .danger-btn {
            border: none;
            background: var(--danger);
            color: #fff;
        }

        .warning-btn {
            border: none;
            background: var(--warning);
            color: #fff;
        }

        button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .message-box {
            display: block;
            margin-bottom: 18px;
            padding: 12px 14px;
            border: 1px solid transparent;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message-box.hidden { display: none; }

        .message-box.success {
            background: rgba(16, 163, 127, 0.12);
            border-color: rgba(16, 163, 127, 0.32);
            color: var(--primary);
        }

        .message-box.error {
            background: rgba(231, 76, 60, 0.12);
            border-color: rgba(231, 76, 60, 0.3);
            color: #c0392b;
        }

        .message-box.info {
            background: rgba(84, 54, 218, 0.1);
            border-color: rgba(84, 54, 218, 0.25);
            color: #5436da;
        }

        [data-theme="dark"] .message-box.success { color: #7ce0c2; }
        [data-theme="dark"] .message-box.error { color: #ff9a8d; }
        [data-theme="dark"] .message-box.info { color: #b8adff; }

        .table-panel {
            overflow: hidden;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            text-align: left;
            white-space: nowrap;
            font-size: 13px;
        }

        th {
            color: var(--text-muted);
            background: var(--main-bg);
            font-weight: 700;
        }

        td {
            color: var(--text-main);
        }

        .empty-state {
            padding: 48px 20px;
            color: var(--text-muted);
            text-align: center;
        }

        .badge-soft {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            border-radius: 999px;
            padding: 0 9px;
            background: rgba(16, 163, 127, 0.12);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
        }

        .badge-warn {
            background: rgba(231, 76, 60, 0.12);
            color: var(--danger);
        }

        .role-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .row-actions {
            display: flex;
            gap: 8px;
        }

        .link-btn {
            border: none;
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            padding: 0;
        }

        .link-btn.danger { color: var(--danger); }
        .link-btn.warning { color: var(--warning); }

        .pagination-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .pagination-actions {
            display: flex;
            gap: 8px;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.45);
        }

        .modal-backdrop.show {
            display: flex;
        }

        .modal-card {
            width: 100%;
            max-width: 560px;
            background: var(--main-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .modal-header,
        .modal-footer {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-footer {
            border-top: 1px solid var(--border);
            border-bottom: none;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .role-checks {
            display: flex;
            gap: 16px;
            min-height: 38px;
            align-items: center;
        }

        .role-checks label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            font-size: 13px;
        }

        @media (max-width: 1100px) {
            .filter-grid {
                grid-template-columns: repeat(3, minmax(120px, 1fr));
            }
        }

        @media (max-width: 860px) {
            .manager-shell {
                grid-template-columns: 1fr;
            }

            .manager-sidebar {
                min-height: auto;
                padding: 24px;
            }

            .sidebar-copy {
                margin-top: 42px;
            }

            .manager-main {
                padding: 24px;
            }
        }

        @media (max-width: 640px) {
            .filter-grid,
            .modal-grid {
                grid-template-columns: 1fr;
            }

            .page-header,
            .pagination-bar {
                align-items: stretch;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="manager-shell">
    <aside class="manager-sidebar">
        <div>
            <div class="brand">
                <div class="brand-mark">Z</div>
                <span>Zephyr Agent</span>
            </div>
            <div class="sidebar-copy">
                <h1>管理已有用户。</h1>
                <p>查询用户、维护基础资料与角色，并通过独立状态接口完成封禁或解封。</p>
            </div>
        </div>
        <div class="sidebar-actions">
            <a class="sidebar-link" href="index.html">返回对话页面</a>
            <button class="sidebar-button" id="logoutBtn" type="button">重新登录</button>
        </div>
    </aside>

    <main class="manager-main">
        <div class="page-header">
            <div>
                <h2>用户管理</h2>
                <p id="userSummary">管理员可修改已有用户资料、角色和状态，不支持新增用户。</p>
            </div>
            <button class="theme-toggle" id="themeToggle" type="button">主题切换</button>
        </div>

        <div class="message-box hidden" id="messageBox" role="alert"></div>

        <section class="card-panel filter-panel" id="managerContent">
            <div class="filter-grid">
                <div>
                    <label class="form-label" for="filterAccount">账号</label>
                    <input class="input input-bordered w-full" id="filterAccount" type="text" placeholder="账号">
                </div>
                <div>
                    <label class="form-label" for="filterUsername">用户名</label>
                    <input class="input input-bordered w-full" id="filterUsername" type="text" placeholder="用户名">
                </div>
                <div>
                    <label class="form-label" for="filterEmail">邮箱</label>
                    <input class="input input-bordered w-full" id="filterEmail" type="text" placeholder="邮箱">
                </div>
                <div>
                    <label class="form-label" for="filterPhone">手机</label>
                    <input class="input input-bordered w-full" id="filterPhone" type="text" placeholder="手机">
                </div>
                <div>
                    <label class="form-label" for="filterStatus">状态</label>
                    <select class="select select-bordered w-full" id="filterStatus">
                        <option value="">全部状态</option>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="BAN">BAN</option>
                    </select>
                </div>
                <div>
                    <label class="form-label" for="filterRole">角色</label>
                    <select class="select select-bordered w-full" id="filterRole">
                        <option value="">全部角色</option>
                        <option value="ADMIN">ADMIN</option>
                        <option value="USER">USER</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <button class="ghost-btn" id="resetBtn" type="button">重置</button>
                <button class="primary-btn" id="searchBtn" type="button">查询</button>
            </div>
        </section>

        <section class="card-panel table-panel" id="managerTable">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>账号</th>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>邮箱</th>
                        <th>手机</th>
                        <th>最后登录</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
                <div class="empty-state hidden" id="emptyState">暂无用户数据</div>
            </div>
            <div class="pagination-bar">
                <span id="pageInfo">第 1 页 / 共 1 页，共 0 条</span>
                <div class="pagination-actions">
                    <button class="ghost-btn" id="prevPageBtn" type="button">上一页</button>
                    <button class="ghost-btn" id="nextPageBtn" type="button">下一页</button>
                </div>
            </div>
        </section>
    </main>
</div>

<div class="modal-backdrop" id="editModal">
    <section class="modal-card">
        <div class="modal-header">
            <h3>编辑用户</h3>
        </div>
        <form id="editForm">
            <div class="modal-body">
                <input id="editId" type="hidden">
                <div class="modal-grid">
                    <div>
                        <label class="form-label" for="editUsername">用户名</label>
                        <input class="input input-bordered w-full" id="editUsername" type="text" placeholder="用户名">
                    </div>
                    <div>
                        <label class="form-label" for="editEmail">邮箱</label>
                        <input class="input input-bordered w-full" id="editEmail" type="email" placeholder="邮箱">
                    </div>
                    <div>
                        <label class="form-label" for="editPhone">手机</label>
                        <input class="input input-bordered w-full" id="editPhone" type="text" placeholder="手机">
                    </div>
                    <div>
                        <label class="form-label" for="editAvatar">头像 URL</label>
                        <input class="input input-bordered w-full" id="editAvatar" type="text" placeholder="https://...">
                    </div>
                    <div style="grid-column: 1 / -1;">
                        <span class="form-label">角色</span>
                        <div class="role-checks">
                            <label><input id="editRoleUser" type="checkbox" value="USER"> USER</label>
                            <label><input id="editRoleAdmin" type="checkbox" value="ADMIN"> ADMIN</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="ghost-btn" id="cancelEditBtn" type="button">取消</button>
                <button class="primary-btn" id="saveEditBtn" type="submit">保存</button>
            </div>
        </form>
    </section>
</div>

<script>
(function () {
    'use strict';

    const API_BASE = '/api';
    const STORAGE_THEME = 'chat_theme';
    const STORAGE_USER = 'zephyr_auth_user';
    const PAGE_SIZE = 10;

    let currentUser = null;
    let users = [];
    let currentPage = 1;
    let totalPages = 1;
    let totalRecords = 0;
    let loading = false;

    const $ = (sel) => document.querySelector(sel);
    const html = document.documentElement;
    const messageBox = $('#messageBox');
    const tableBody = $('#userTableBody');
    const emptyState = $('#emptyState');
    const pageInfo = $('#pageInfo');
    const prevPageBtn = $('#prevPageBtn');
    const nextPageBtn = $('#nextPageBtn');
    const editModal = $('#editModal');

    function getStoredUser() {
        try {
            const raw = localStorage.getItem(STORAGE_USER);
            return raw ? JSON.parse(raw) : null;
        } catch (error) {
            return null;
        }
    }

    function hasRole(user, role) {
        return Array.isArray(user?.roles) && user.roles.includes(role);
    }

    function showMessage(message, type = 'info') {
        const safeType = ['success', 'error', 'info'].includes(type) ? type : 'info';
        messageBox.className = `message-box ${safeType}`;
        messageBox.textContent = message;
        messageBox.classList.remove('hidden');
    }

    function clearMessage() {
        messageBox.className = 'message-box hidden';
        messageBox.textContent = '';
    }

    function setLoading(nextLoading) {
        loading = nextLoading;
        $('#searchBtn').disabled = loading;
        $('#resetBtn').disabled = loading;
        prevPageBtn.disabled = loading || currentPage <= 1;
        nextPageBtn.disabled = loading || currentPage >= totalPages;
        $('#saveEditBtn').disabled = loading;
    }

    async function apiPost(path, payload) {
        const res = await fetch(`${API_BASE}${path}`, {
            method: 'POST',
            credentials: 'include',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        let json = null;
        try {
            json = await res.json();
        } catch (error) {
            throw new Error('服务响应解析失败');
        }
        if (json.code !== 200) {
            throw new Error(json.message || '请求失败');
        }
        return json.data;
    }

    function getFilterInfo() {
        const filterInfo = {};
        const fields = [
            ['userAccount', $('#filterAccount').value.trim()],
            ['username', $('#filterUsername').value.trim()],
            ['email', $('#filterEmail').value.trim()],
            ['phone', $('#filterPhone').value.trim()],
            ['status', $('#filterStatus').value],
            ['role', $('#filterRole').value]
        ];
        fields.forEach(([key, value]) => {
            if (value) {
                filterInfo[key] = value;
            }
        });
        return filterInfo;
    }

    async function loadUsers(page = currentPage) {
        try {
            setLoading(true);
            clearMessage();
            const pageData = await apiPost('/user/manager/findAllUser', {
                pageIndex: page,
                pageSize: PAGE_SIZE,
                filterInfo: getFilterInfo()
            });
            users = Array.isArray(pageData?.records) ? pageData.records : [];
            currentPage = Number(pageData?.current || page);
            totalPages = Math.max(1, Number(pageData?.pages || 1));
            totalRecords = Number(pageData?.total || 0);
            renderTable();
            renderPagination();
        } catch (error) {
            users = [];
            renderTable();
            renderPagination();
            showMessage(error.message, 'error');
        } finally {
            setLoading(false);
        }
    }

    function renderTable() {
        tableBody.innerHTML = '';
        emptyState.classList.toggle('hidden', users.length > 0);
        users.forEach((user) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${escapeHtml(user.userAccount || '-')}</td>
                <td>${escapeHtml(user.username || '-')}</td>
                <td>${renderRoles(user.roles)}</td>
                <td>${renderStatus(user.status)}</td>
                <td>${escapeHtml(user.email || '-')}</td>
                <td>${escapeHtml(user.phone || '-')}</td>
                <td>${formatTime(user.lastLoginTime)}</td>
                <td>
                    <div class="row-actions">
                        <button class="link-btn" type="button" data-action="edit" data-id="${escapeHtml(user.id)}">编辑</button>
                        <button class="link-btn warning" type="button" data-action="status" data-id="${escapeHtml(user.id)}">${user.status === 'BAN' ? '解封' : '封禁'}</button>
                        <button class="link-btn danger" type="button" data-action="delete" data-id="${escapeHtml(user.id)}">删除</button>
                    </div>
                </td>
            `;
            tableBody.appendChild(tr);
        });
    }

    function renderRoles(roles) {
        if (!Array.isArray(roles) || roles.length === 0) {
            return '-';
        }
        return `<span class="role-list">${roles.map((role) => `<span class="badge-soft">${escapeHtml(role)}</span>`).join('')}</span>`;
    }

    function renderStatus(status) {
        const isBan = status === 'BAN';
        return `<span class="badge-soft ${isBan ? 'badge-warn' : ''}">${escapeHtml(status || '-')}</span>`;
    }

    function renderPagination() {
        pageInfo.textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页，共 ${totalRecords} 条`;
        prevPageBtn.disabled = loading || currentPage <= 1;
        nextPageBtn.disabled = loading || currentPage >= totalPages;
    }

    function formatTime(value) {
        if (!value) {
            return '-';
        }
        return String(value).replace('T', ' ').slice(0, 19);
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function findUser(id) {
        return users.find((user) => user.id === id);
    }

    function openEditModal(user) {
        $('#editId').value = user.id || '';
        $('#editUsername').value = user.username || '';
        $('#editEmail').value = user.email || '';
        $('#editPhone').value = user.phone || '';
        $('#editAvatar').value = user.avatar || '';
        $('#editRoleUser').checked = Array.isArray(user.roles) && user.roles.includes('USER');
        $('#editRoleAdmin').checked = Array.isArray(user.roles) && user.roles.includes('ADMIN');
        editModal.classList.add('show');
    }

    function closeEditModal() {
        editModal.classList.remove('show');
    }

    async function saveUser(event) {
        event.preventDefault();
        const roles = [];
        if ($('#editRoleUser').checked) {
            roles.push('USER');
        }
        if ($('#editRoleAdmin').checked) {
            roles.push('ADMIN');
        }
        if (roles.length === 0) {
            showMessage('请至少选择一个角色', 'error');
            return;
        }

        try {
            setLoading(true);
            await apiPost('/user/manager/batchSave', {
                addedData: [],
                modifyData: [{
                    id: $('#editId').value,
                    username: $('#editUsername').value.trim(),
                    email: $('#editEmail').value.trim(),
                    phone: $('#editPhone').value.trim(),
                    avatar: $('#editAvatar').value.trim(),
                    roles
                }],
                removeData: []
            });
            closeEditModal();
            showMessage('用户信息已更新', 'success');
            await loadUsers(currentPage);
        } catch (error) {
            showMessage(error.message, 'error');
        } finally {
            setLoading(false);
        }
    }

    async function deleteUser(user) {
        if (!confirm(`确认删除用户「${user.username || user.userAccount || user.id}」吗？`)) {
            return;
        }
        try {
            setLoading(true);
            await apiPost('/user/manager/batchSave', {
                modifyData: [],
                removeData: [{ id: user.id }]
            });
            showMessage('用户已删除', 'success');
            await loadUsers(currentPage);
        } catch (error) {
            showMessage(error.message, 'error');
        } finally {
            setLoading(false);
        }
    }

    async function changeStatus(user) {
        const nextStatus = user.status === 'BAN' ? 'ACTIVE' : 'BAN';
        const actionText = nextStatus === 'BAN' ? '封禁' : '解封';
        if (!confirm(`确认${actionText}用户「${user.username || user.userAccount || user.id}」吗？`)) {
            return;
        }
        try {
            setLoading(true);
            await apiPost('/user/manager/changeStatus', {
                id: user.id,
                status: nextStatus
            });
            showMessage(`用户已${actionText}`, 'success');
            await loadUsers(currentPage);
        } catch (error) {
            showMessage(error.message, 'error');
        } finally {
            setLoading(false);
        }
    }

    function handleTableClick(event) {
        const button = event.target.closest('button[data-action]');
        if (!button) {
            return;
        }
        const user = findUser(button.dataset.id);
        if (!user) {
            showMessage('用户数据不存在，请刷新后重试', 'error');
            return;
        }
        if (button.dataset.action === 'edit') {
            openEditModal(user);
        } else if (button.dataset.action === 'delete') {
            deleteUser(user);
        } else if (button.dataset.action === 'status') {
            changeStatus(user);
        }
    }

    function resetFilters() {
        $('#filterAccount').value = '';
        $('#filterUsername').value = '';
        $('#filterEmail').value = '';
        $('#filterPhone').value = '';
        $('#filterStatus').value = '';
        $('#filterRole').value = '';
        loadUsers(1);
    }

    function logout() {
        localStorage.removeItem(STORAGE_USER);
        window.location.href = 'login.html';
    }

    function loadTheme() {
        const theme = localStorage.getItem(STORAGE_THEME) || 'light';
        html.setAttribute('data-theme', theme);
        updateThemeToggle(theme);
    }

    function updateThemeToggle(theme) {
        $('#themeToggle').textContent = theme === 'dark' ? '切换亮色' : '主题切换';
    }

    function toggleTheme() {
        const current = html.getAttribute('data-theme') || 'light';
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem(STORAGE_THEME, next);
        updateThemeToggle(next);
    }

    function guardPage() {
        currentUser = getStoredUser();
        if (!currentUser) {
            window.location.href = 'login.html';
            return false;
        }
        $('#userSummary').textContent = `${currentUser.username || currentUser.userAccount || '管理员'}，可维护已有用户资料、角色和状态。`;
        if (!hasRole(currentUser, 'ADMIN')) {
            $('#managerContent').style.display = 'none';
            $('#managerTable').style.display = 'none';
            showMessage('当前用户无权访问用户管理页面，请返回对话页面或重新登录管理员账号。', 'error');
            return false;
        }
        return true;
    }

    $('#searchBtn').addEventListener('click', () => loadUsers(1));
    $('#resetBtn').addEventListener('click', resetFilters);
    prevPageBtn.addEventListener('click', () => {
        if (currentPage > 1) {
            loadUsers(currentPage - 1);
        }
    });
    nextPageBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
            loadUsers(currentPage + 1);
        }
    });
    tableBody.addEventListener('click', handleTableClick);
    $('#editForm').addEventListener('submit', saveUser);
    $('#cancelEditBtn').addEventListener('click', closeEditModal);
    editModal.addEventListener('click', (event) => {
        if (event.target === editModal) {
            closeEditModal();
        }
    });
    $('#logoutBtn').addEventListener('click', logout);
    $('#themeToggle').addEventListener('click', toggleTheme);

    loadTheme();
    if (guardPage()) {
        loadUsers(1);
    }
})();
</script>
</body>
</html>
